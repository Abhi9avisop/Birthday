<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #f9c4d2;
    --rose: #e8889f;
    --lavender: #d5c9f0;
    --violet: #9b84d4;
    --cream: #fff8f4;
    --soft-bg: #fdf0f5;
    --text: #4a3550;
    --muted: #8a7090;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Sparkles ── */
  .sparkle-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .sp {
    position: absolute;
    font-size: 18px;
    opacity: 0;
    animation: floatUp var(--d, 6s) var(--delay, 0s) infinite ease-in;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0.6); }
    20%  { opacity: 0.7; }
    80%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.1); }
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    padding: 2rem;
    text-align: center;
  }

  .hero-title {
    font-family: 'Caveat', cursive;
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 600;
    color: var(--text);
    opacity: 0;
    animation: fadeSlideUp 1.2s ease forwards 0.3s;
    line-height: 1.1;
  }

  .hero-sub {
    font-size: clamp(1rem, 3vw, 1.25rem);
    color: var(--muted);
    font-weight: 300;
    opacity: 0;
    animation: fadeSlideUp 1.2s ease forwards 0.7s;
    letter-spacing: 0.01em;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Button ── */
  .btn {
    display: inline-block;
    margin-top: 0.8rem;
    padding: 0.9rem 2.2rem;
    border-radius: 999px;
    border: 2px solid var(--rose);
    background: transparent;
    color: var(--rose);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    opacity: 0;
    animation: fadeSlideUp 1.2s ease forwards 1.1s, gentleBounce 2.5s ease-in-out 2.5s infinite;
    transition: background 0.3s, color 0.3s, box-shadow 0.3s;
    letter-spacing: 0.02em;
  }
  .btn:hover {
    background: var(--rose);
    color: #fff;
    box-shadow: 0 0 24px rgba(232, 136, 159, 0.45);
    animation: none;
  }
  @keyframes gentleBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  /* ── Letter Section ── */
  .letter-section {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 1.5rem;
    gap: 3rem;
    background: linear-gradient(160deg, #fff8f4 0%, #f5eefe 100%);
  }

  .letter-card {
    max-width: 640px;
    width: 100%;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(213, 201, 240, 0.5);
    border-radius: 24px;
    padding: 2.8rem 3rem;
    box-shadow: 0 8px 48px rgba(155, 132, 212, 0.12), 0 2px 8px rgba(0,0,0,0.04);
  }

  .letter-label {
    font-family: 'Caveat', cursive;
    font-size: 1.4rem;
    color: var(--violet);
    margin-bottom: 1.4rem;
    display: block;
  }

  .letter-text {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text);
    font-weight: 300;
    min-height: 180px;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--rose);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }
  .cursor.done { display: none; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* ── Gift Box ── */
  .gift-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .gift-label {
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .gift-box {
    position: relative;
    width: 100px;
    cursor: pointer;
    user-select: none;
  }

  .gift-base {
    width: 100px;
    height: 72px;
    background: linear-gradient(135deg, var(--pink), #f2a0b8);
    border-radius: 6px 6px 10px 10px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .gift-base::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 14px; height: 100%;
    background: rgba(255,255,255,0.35);
  }

  .gift-lid {
    width: 108px;
    height: 28px;
    background: linear-gradient(135deg, var(--rose), #d4607a);
    border-radius: 6px;
    margin-left: -4px;
    position: relative;
    transform-origin: bottom center;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 2;
  }
  .gift-lid::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 14px; height: 100%;
    background: rgba(255,255,255,0.3);
  }
  .gift-lid .ribbon-bow {
    position: absolute;
    top: -16px; left: 50%; transform: translateX(-50%);
    width: 36px; height: 20px;
  }
  .gift-lid .ribbon-bow::before,
  .gift-lid .ribbon-bow::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: #b5436a;
    border-radius: 50% 50% 0 50%;
    top: 2px;
  }
  .gift-lid .ribbon-bow::before { left: 0; transform: rotate(-40deg); }
  .gift-lid .ribbon-bow::after  { right: 0; transform: rotate(40deg) scaleX(-1); }

  .gift-box.opened .gift-lid {
    transform: rotate(-55deg) translateY(-8px);
  }
  .gift-box:not(.opened):hover .gift-base { transform: scale(1.04); }

  .gift-message {
    max-width: 400px;
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 1.45rem;
    color: var(--violet);
    line-height: 1.5;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.7s ease 0.4s, transform 0.7s ease 0.4s;
  }
  .gift-message.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .sparkle-burst {
    position: absolute;
    top: -20px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }
  .sparkle-burst span {
    position: absolute;
    font-size: 16px;
    opacity: 0;
  }
  .sparkle-burst.pop span { animation: burstOut 0.7s ease forwards; }
  @keyframes burstOut {
    0%   { opacity: 1; transform: translate(var(--tx, 0), var(--ty, 0)) scale(0.5); }
    100% { opacity: 0; transform: translate(calc(var(--tx, 0) * 3.5), calc(var(--ty, 0) * 3.5)) scale(1.2); }
  }

  /* ── Closing ── */
  .closing {
    padding: 3rem 1.5rem 5rem;
    text-align: center;
    z-index: 1;
    position: relative;
  }
  .closing p {
    font-family: 'Caveat', cursive;
    font-size: 1.6rem;
    color: var(--muted);
  }

  @media (max-width: 480px) {
    .letter-card { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- Floating sparkles -->
<div class="sparkle-layer" id="sparkleLayer"></div>

<!-- Hero -->
<section class="hero">
  <h1 class="hero-title">Happy Birthday ❤️</h1>
  <p class="hero-sub">ok don't judge this… bas dekh 😭</p>
  <a class="btn" onclick="scrollToLetter()">Open Your Surprise 🎁</a>
</section>

<!-- Letter + Gift -->
<section class="letter-section" id="letterSection">

  <div class="letter-card">
    <span class="letter-label">✦ A little note for you</span>
    <div class="letter-text" id="letterText">
      <span id="typed"></span><span class="cursor" id="cursor"></span>
    </div>
  </div>

  <div class="gift-wrap">
    <span class="gift-label">tap the gift ✨</span>
    <div class="gift-box" id="giftBox" onclick="openGift()">
      <div class="gift-lid">
        <div class="ribbon-bow"></div>
      </div>
      <div class="gift-base"></div>
      <div class="sparkle-burst" id="burst">
        <span style="--tx:-24px;--ty:-32px;">✨</span>
        <span style="--tx:28px;--ty:-28px;">🌸</span>
        <span style="--tx:-36px;--ty:-8px;">💫</span>
        <span style="--tx:38px;--ty:-10px;">⭐</span>
        <span style="--tx:4px;--ty:-42px;">🌟</span>
      </div>
    </div>
    <p class="gift-message" id="giftMsg">
      hehehe craazyyyyy bilkulllll aajkaa din apkaa
    </p>
  </div>

</section>

<div class="closing">
  <p>ab Enjoy karoooo</p>
</div>

<script>
  /* ─── Message to edit ─── */
  const MESSAGE =
    `happy birthday Sammridhaa 🎂\nwe literally met at tuition and somehow ye sab hua??\nbut still… fun hai 😋\nbut jokes aside,\naap genuinely bohot achi hain.\nlike actually,\nitna kind heart sabka nahi hota.\nsabko apna samajh leti hain,\nand you're always there when it matters.\naur haan,\nyou seriously underestimate yourself A LOT.\njabki aap easily sab kuch achieve kar sakti hain.\nalso random baatein sunna,\nlate night talks,\ndumb jokes pe hasna —\nthat stuff matters more than you think.\naur honestly,\naisa banda milna jiske saath itna normal feel ho…\nrare hai.\nso yeah,\nhappy birthday.\nenjoy kar, mast reh,\naur thoda less overthink kar 😭✨\nhappy birthdayyy didi :)`;

  /* ─── Floating sparkles ─── */
  const layer = document.getElementById('sparkleLayer');
  const SYMBOLS = ['✦','✧','♡','·','⋆','˚'];
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('span');
    s.className = 'sp';
    s.textContent = SYMBOLS[i % SYMBOLS.length];
    const left = Math.random() * 98;
    const delay = Math.random() * 8;
    const dur   = 5 + Math.random() * 7;
    const size  = 10 + Math.random() * 14;
    s.style.cssText = `left:${left}%;bottom:0;font-size:${size}px;--d:${dur}s;--delay:${delay}s;color:${i%3===0?'#e8889f':i%3===1?'#9b84d4':'#f9c4d2'};`;
    layer.appendChild(s);
  }

  /* ─── Scroll to letter ─── */
  function scrollToLetter() {
    document.getElementById('letterSection').scrollIntoView({ behavior: 'smooth' });
    setTimeout(startTyping, 800);
  }

  /* ─── Typing animation ─── */
  let typed = false;
  function startTyping() {
    if (typed) return;
    typed = true;
    const el = document.getElementById('typed');
    const cursor = document.getElementById('cursor');
    let i = 0;
    const speed = 28;
    function tick() {
      if (i < MESSAGE.length) {
        const ch = MESSAGE[i++];
        el.innerHTML += ch === '\n' ? '<br>' : ch;
        setTimeout(tick, ch === '\n' ? speed * 6 : speed + Math.random() * 18);
      } else {
        cursor.classList.add('done');
      }
    }
    tick();
  }

  /* ─── Gift box ─── */
  let opened = false;
  function openGift() {
    if (opened) return;
    opened = true;
    const box  = document.getElementById('giftBox');
    const msg  = document.getElementById('giftMsg');
    const burst = document.getElementById('burst');
    box.classList.add('opened');
    burst.classList.add('pop');
    setTimeout(() => msg.classList.add('visible'), 500);
  }
</script>
</body>
</html>
